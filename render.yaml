services:
  - type: web
    name: cricket-shadow-coach-api
    env: python
    rootDir: api
    # Full CV stack so /api/track-ball works on this container deployment.
    buildCommand: "pip install -r requirements-full.txt"
    startCommand: "uvicorn index:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENABLE_BALL_TRACKING
        value: "true"
