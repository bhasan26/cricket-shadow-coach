<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 450" width="100%" height="100%" fill="none">
  <!-- Top Whistle Loop & Ring -->
  <circle cx="100" cy="55" r="14" stroke="#ffffff" stroke-width="6" />
  <path d="M 114 55 H 128" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <circle cx="128" cy="55" r="4" fill="#ffffff" />
  
  <!-- Arch/Semi-Circle -->
  <path d="M 62 105 A 46 46 0 0 1 138 105" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Cricket Bat Blade -->
  <path d="M 76 100 H 124 V 240 L 112 240 L 100 200 L 88 240 L 76 240 Z" fill="#ffffff" stroke="#0c6c40" stroke-width="10" stroke-linejoin="miter" />
  
  <!-- Cricket Bat Handle -->
  <rect x="94" y="240" width="12" height="90" fill="#0c6c40" rx="6" />

  <!-- Cricket Ball on Right Side -->
  <circle cx="132" cy="160" r="26" fill="#ffffff" stroke="#0c6c40" stroke-width="8" />
  <!-- Ball Seam -->
  <path d="M 112 140 A 26 26 0 0 0 152 180" stroke="#0c6c40" stroke-width="6" stroke-linecap="round" />

  <!-- Stacked C C O Monogram at the Bottom -->
  <text x="100" y="365" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#0c6c40" text-anchor="middle">C</text>
  <text x="100" y="398" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#0c6c40" text-anchor="middle">C</text>
  <text x="100" y="431" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#0c6c40" text-anchor="middle">O</text>
</svg>