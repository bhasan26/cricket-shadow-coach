# fly.toml — Fly.io configuration for Cricket Shadow Coach API
# Run: fly launch --no-deploy   (first time)
# Then: fly deploy              (to deploy)

app = "cricket-shadow-coach-api-bhasan26"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
